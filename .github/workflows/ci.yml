name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run package tests
        run: python -m pytest --confcutdir=tests/library tests/library

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install supply-chain tooling and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test,build,security]

      - name: Audit runtime dependencies
        run: python -m pip_audit . --progress-spinner off

      - name: Generate SPDX SBOM
        run: python scripts/generate_sbom.py --output dist/sbom/inepro-metering-${{ github.sha }}.spdx.json --git-ref ${{ github.sha }}

      - name: Validate SBOM JSON
        run: python -m json.tool dist/sbom/inepro-metering-${{ github.sha }}.spdx.json > /dev/null

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: spdx-sbom
          path: dist/sbom/*.spdx.json
